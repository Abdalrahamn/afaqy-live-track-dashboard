<aside class="w-60 bg-white border-r border-slate-200 flex flex-col shrink-0">
  <div class="flex items-center gap-3 px-6 h-16 border-b border-slate-100">
    <div
      class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold text-sm"
    >
      A
    </div>
    <span class="text-lg font-bold text-slate-900 tracking-tight">AFAQY</span>
  </div>
  <nav class="flex-1 px-3 py-4 overflow-y-auto">
    <div class="mb-6">
      <p class="text-[0.625rem] font-semibold text-slate-400 uppercase tracking-widest px-3 mb-2">
        Main
      </p>
      <a
        routerLink="/"
        routerLinkActive="bg-blue-50 text-blue-600 font-semibold!"
        [routerLinkActiveOptions]="{ exact: true }"
        class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 hover:bg-slate-50 font-medium text-sm cursor-pointer transition-colors"
      >
        <mat-icon class="text-xl! w-5! h-5!">dashboard</mat-icon>
        Dashboard
      </a>
      <a
        routerLink="/rooms"
        routerLinkActive="bg-blue-50 text-blue-600 font-semibold!"
        class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 hover:bg-slate-50 font-medium text-sm cursor-pointer transition-colors"
      >
        <mat-icon class="text-xl! w-5! h-5! text-slate-400!">place</mat-icon>
        Rooms
      </a>
      <a
        routerLink="/alerts"
        routerLinkActive="bg-blue-50 text-blue-600 font-semibold!"
        class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 hover:bg-slate-50 font-medium text-sm cursor-pointer transition-colors"
      >
        <mat-icon class="text-xl! w-5! h-5! text-slate-400!">notifications</mat-icon>
        Alerts
      </a>
    </div>
    <div class="mb-6">
      <p class="text-[0.625rem] font-semibold text-slate-400 uppercase tracking-widest px-3 mb-2">
        Analytics
      </p>
      <a
        routerLink="/reports"
        routerLinkActive="bg-blue-50 text-blue-600 font-semibold!"
        class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 hover:bg-slate-50 font-medium text-sm cursor-pointer transition-colors"
      >
        <mat-icon class="text-xl! w-5! h-5! text-slate-400!">description</mat-icon>
        Reports
      </a>
      <a
        routerLink="/sensors"
        routerLinkActive="bg-blue-50 text-blue-600 font-semibold!"
        class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 hover:bg-slate-50 font-medium text-sm cursor-pointer transition-colors"
      >
        <mat-icon class="text-xl! w-5! h-5! text-slate-400!">sensors</mat-icon>
        Sensors
      </a>
    </div>
    <div>
      <p class="text-[0.625rem] font-semibold text-slate-400 uppercase tracking-widest px-3 mb-2">
        System
      </p>
      <a
        routerLink="/settings"
        routerLinkActive="bg-blue-50 text-blue-600 font-semibold!"
        class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 hover:bg-slate-50 font-medium text-sm cursor-pointer transition-colors"
      >
        <mat-icon class="text-xl! w-5! h-5! text-slate-400!">settings</mat-icon>
        Settings
      </a>
    </div>
  </nav>
</aside>
